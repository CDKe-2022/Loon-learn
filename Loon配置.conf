地区 = select,香港,台湾,日本,韩国,新加坡,英国,美国,url = http://cp.cloudflare.com,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/DomesticMedia.png
手动切换 = select,DIRECT,【HY2】Eusevr｜🇩🇪德国,【VMESS】Eusevr｜🇩🇪德国,【Vless】Eusevr｜🇩🇪德国,【混淆】clodflare-80,【混淆】clodflare-443,cf优选,dy,url = http://www.gstatic.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Clubhouse.png
高速节点 = select,url = http://cp.cloudflare.com,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png
防丢机场 = select,url = http://cp.cloudflare.com,img-url = https://raw.githubusercontent.com/Orz-3/mini/master/Color/Urltest.png
测试节点 = select,cf优选,【混淆】clodflare-443,【混淆】clodflare-80,Cloudflare(IPv6),Cloudflare(worker),Cloudflare(2082),Cloudflare(2095),sub混淆裂变,url = http://detectportal.firefox.com/success.txt,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple_Update.png
香港 = load-balance,🇭🇰 香港节点,url = http://www.gstatic.com/generate_204,interval = 300,max-timeout = 1000,algorithm = pcc,img-url = https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png
台湾 = url-test,🇨🇳 台湾节点,url = http://www.gstatic.com/generate_204,interval = 300,tolerance = 100,img-url = https://raw.githubusercontent.com/Orz-3/mini/master/Color/CN.png
日本 = url-test,🇯🇵 日本节点,url = http://1.0.0.1/generate_204,interval = 300,tolerance = 100,img-url = https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png
韩国 = url-test,🇰🇷 韩国节点,url = http://cp.cloudflare.com,interval = 600,tolerance = 100,img-url = https://raw.githubusercontent.com/Orz-3/mini/master/Color/KR.png
新加坡 = url-test,🇸🇬 狮城节点,url = http://www.msftconnecttest.com/connecttest.txt,interval = 300,tolerance = 100,img-url = https://raw.githubusercontent.com/Orz-3/mini/master/Color/TR.png
英国 = url-test,🇬🇧英国节点,url = http://www.msftconnecttest.com/connecttest.txt,interval = 300,tolerance = 100,img-url = https://raw.githubusercontent.com/Orz-3/mini/master/Color/UK.png
美国 = url-test,🇺🇲 美国节点,url = http://www.msftconnecttest.com/connecttest.txt,interval = 300,tolerance = 100,img-url = https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png
🫧 Fallback故障转移 = fallback,🇨🇳 台湾节点,🇰🇷 韩国节点,🇭🇰 香港节点,🇬🇧英国节点,🇷🇺俄国节点,🇮🇳印度节点,🇯🇵 日本节点,🇨🇦加拿大节点,🇦🇺澳洲节点,🇳🇱荷兰节点,🇩🇪德国节点,🇸🇬 狮城节点,🇺🇲 美国节点,url = http://cp.cloudflare.com,interval = 60,max-timeout = 3000
🔮 Load-banlance负载均衡 = load-balance,🇭🇰 香港节点,🇮🇳印度节点,🇯🇵 日本节点,🇬🇧英国节点,🇨🇦加拿大节点,🇦🇺澳洲节点,🇳🇱荷兰节点,🇨🇳 台湾节点,🇰🇷 韩国节点,🇷🇺俄国节点,🇩🇪德国节点,🇸🇬 狮城节点,🇺🇲 美国节点,url = http://cp.cloudflare.com,interval = 600,max-timeout = 3000,algorithm = round-robin
♻️ Url-test自动选择 = url-test,🇭🇰 香港节点,🇮🇳印度节点,🇯🇵 日本节点,🇬🇧英国节点,🇨🇦加拿大节点,🇦🇺澳洲节点,🇳🇱荷兰节点,🇨🇳 台湾节点,🇰🇷 韩国节点,🇷🇺俄国节点,🇩🇪德国节点,🇸🇬 狮城节点,🇺🇲 美国节点,url = http://cp.cloudflare.com,interval = 300,tolerance = 100
全球拦截 = select,REJECT,DIRECT,节点选择,url = http://cp.cloudflare.com,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Advertising.png
全球直连 = select,DIRECT,url = http://cp.cloudflare.com,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Direct.png
兜底策略 = select,节点选择,手动切换,DIRECT,url = http://cp.cloudflare.com,img-url = https://github.com/shindgewongxj/WHATSINStash/raw/main/icon/fallback.png

# >筛选订阅节点
[Remote Filter]
# >通过正则方式筛选
Cloudflare = NameRegex, FilterKey = "(?i)(Cloudflare|cf)"
🇭🇰 香港节点 = NameRegex, FilterKey = "^(?=.*((?i)🇭🇰|香港|(\b(HK|HKG|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
🇮🇳印度节点 = NameRegex, FilterKey = "(?i)(印|Indian|🇮🇳)"
🇯🇵 日本节点 = NameRegex, FilterKey = "^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|JPN|Japan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
🇬🇧英国节点 = NameRegex, FilterKey = "(?i)(英|England|UK|🇬🇧)"
🇨🇦加拿大节点 = NameRegex, FilterKey = "(?i)(加拿大|Canada|🇨🇦)"
🇦🇺澳洲节点 = NameRegex, FilterKey = "(?i)(澳|Australia| Au| 🇦🇺)"
🇳🇱荷兰节点 = NameRegex, FilterKey = "(?i)(荷|Netherland|🇳🇱)"
🇨🇳 台湾节点 = NameRegex, FilterKey = "(?i)(台|TW|Tai|中華|中華民國)"
🇰🇷 韩国节点 = NameRegex, FilterKey = "(?i)(KR|Korea|KOR|首尔|韩| 🇰🇷|韓)"
🇷🇺俄国节点 = NameRegex, FilterKey = "(?i)(俄|Russia|🇷🇺)"
🇩🇪德国节点 = NameRegex, FilterKey = "(?i)(德|De|🇩🇪)"
🇸🇬 狮城节点 = NameRegex, FilterKey = "(?i)(新加坡|坡|狮城|SG|Singapore)"
🇺🇲 美国节点 = NameRegex, FilterKey = "^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|USA|United States)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$"

